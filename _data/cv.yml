    Publications:
      - title: Certified but Fooled!  Breaking Certified Defences with Ghost Certificates
        authors:
          - Quoc Viet Vo
        publisher: AAAI
        releaseDate: 2026
        url: https://en.wikisource.org/wiki/Translation:On_the_Electrodynamics_of_Moving_Bodies
        summary: This study shows how probabilistic certification frameworks for machine learning can be maliciously manipulated. While past work relied on large, noticeable changes, the authors use "region-focused adversarial examples" to craft small, imperceptible perturbations. These effectively spoof safety certificates and bypass state-of-the-art defenses, exposing critical limits in current robustness certification methods.

      - title: BruSLeAttack Query-Efficient Score-Based Sparse Adversarial Attack
        authors:
          - Quoc Viet Vo
        publisher: ICLR
        releaseDate: 2024
        url: https://de.wikisource.org/wiki/Über_einen_die_Erzeugung_und_Verwandlung_des_Lichtes_betreffenden_heuristischen_Gesichtspunkt
        summary: This study addresses the NP-hard, non-differentiable challenge of generating sparse adversarial attacks against black-box models using only score-based query replies. The authors introduce BruSLeAttack, a faster, query-efficient algorithm. It achieves state-of-the-art success rates on ImageNet, effectively bypasses defenses, and exposes vulnerabilities in real-world systems like Google Cloud Vision..

      - title: Query efficient decision based sparse attacks against black-box deep learning models
        authors:
          - Quoc Viet Vo
        publisher: ICLR
        releaseDate: 2022
        url: https://de.wikisource.org/wiki/Die_Grundlage_der_allgemeinen_Relativitätstheorie
        summary: This study introduces SparseEvo, an evolution-based algorithm designed for decision-based sparse adversarial attacks against black-box deep learning models, including vision transformers. Addressing an NP-hard optimization challenge, SparseEvo achieves state-of-the-art query efficiency and competitiveness on ImageNet while exposing critical safety vulnerabilities in deployed real-world machine learning systems..

